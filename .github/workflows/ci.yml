name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Service repo. Use a named subdirectory so sibling crates can be
      # checked out alongside; the [patch] paths in Cargo.toml expect
      # `../<sibling-name>` relative to this directory.
      - name: Checkout service
        uses: actions/checkout@v4
        with:
          path: bridge-table-service

      # Sibling crate checkouts. REQUIRED because Cargo.toml has [patch]
      # entries pointing to ../<sibling>; without these the test job fails
      # before build-and-push runs. The same blocks must also be in the
      # build-and-push job below (they don't share a workspace).
      - name: Checkout bridge-types
        uses: actions/checkout@v4
        with:
          repository: bridge-craftwork/bridge-types
          path: bridge-types
      - name: Checkout bridge-encodings
        uses: actions/checkout@v4
        with:
          repository: bridge-craftwork/bridge-encodings
          path: bridge-encodings
      - name: Checkout bridge-rulebot
        uses: actions/checkout@v4
        with:
          repository: bridge-craftwork/bridge-rulebot
          path: bridge-rulebot

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bridge-table-service
      - run: cargo fmt --check
        working-directory: bridge-table-service
      - run: cargo clippy -- -D warnings
        working-directory: bridge-table-service
      - run: cargo test --all
        working-directory: bridge-table-service

  build-and-push:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout service
        uses: actions/checkout@v4
        with:
          path: bridge-table-service

      # Sibling crate checkouts (separate runner from the test job).
      - name: Checkout bridge-types
        uses: actions/checkout@v4
        with:
          repository: bridge-craftwork/bridge-types
          path: bridge-types
      - name: Checkout bridge-encodings
        uses: actions/checkout@v4
        with:
          repository: bridge-craftwork/bridge-encodings
          path: bridge-encodings
      - name: Checkout bridge-rulebot
        uses: actions/checkout@v4
        with:
          repository: bridge-craftwork/bridge-rulebot
          path: bridge-rulebot

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Determine tags
        id: tags
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "tags=ghcr.io/${OWNER}/${REPO}:${VERSION},ghcr.io/${OWNER}/${REPO}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=ghcr.io/${OWNER}/${REPO}:main" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/build-push-action@v5
        with:
          context: bridge-table-service
          # One entry per sibling; the name on the left must match the
          # COPY --from=<name> in the Dockerfile.
          build-contexts: |
            bridge-types=bridge-types
            bridge-encodings=bridge-encodings
            bridge-rulebot=bridge-rulebot
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
