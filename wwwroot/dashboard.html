<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>bridge-table-service — dashboard</title>
<style>
  :root {
    --bg: #fafafa;
    --fg: #1a1a1a;
    --muted: #666;
    --border: #e1e1e1;
    --accent: #2563eb;
    --ok: #16a34a;
    --warn: #d97706;
    --err: #dc2626;
  }
  * { box-sizing: border-box; }
  body {
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    padding: 24px;
  }
  h1 { font-size: 20px; margin: 0 0 4px; }
  h2 { font-size: 14px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin: 32px 0 12px; }
  .meta { color: var(--muted); font-size: 12px; margin-bottom: 24px; }
  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
  .tile {
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .tile .label { font-size: 11px; text-transform: uppercase; color: var(--muted); }
  .tile .value { font-size: 22px; font-weight: 600; margin-top: 4px; }
  table {
    width: 100%;
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    border-collapse: separate;
    border-spacing: 0;
    overflow: hidden;
  }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  th { font-size: 11px; text-transform: uppercase; color: var(--muted); background: #f3f4f6; }
  tr:last-child td { border-bottom: none; }
  .ok { color: var(--ok); }
  .warn { color: var(--warn); }
  .err { color: var(--err); }
</style>
</head>
<body>
  <h1>bridge-table-service</h1>
  <div class="meta">version {{VERSION}} · uptime {{UPTIME_SECONDS}}s</div>

  <h2>System health</h2>
  <div class="tiles">
    <div class="tile"><div class="label">Status</div><div class="value ok">OK</div></div>
    <div class="tile"><div class="label">Version</div><div class="value">{{VERSION}}</div></div>
    <div class="tile"><div class="label">Uptime</div><div class="value">{{UPTIME_SECONDS}}s</div></div>
  </div>

  <h2>Product analytics</h2>
  <p class="meta">Service-specific tables go here. Query the SQLite <code>events</code> table from <code>src/routes/dashboard.rs</code> and render.</p>
</body>
</html>
